<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudySwap</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png" />
    <link rel="shortcut icon" href="favicon.ico" />
  </head>
  <body class="auth-body">
    <header class="top-nav">
      <div class="top-nav-inner">
        <div class="brand-left">
          <a href="index.html" class="brand" aria-label="StudySwap home">
            <img src="assets/studyswap.png" class="brand-logo" alt="StudySwap" />
          </a>
          <a href="landing.html" class="icon-btn">HOME</a>
        </div>
        <div class="desktop-nav">
          <nav class="links" aria-label="Shop sections">
            <a href="index.html" class="link">ALL</a>
            <a href="search.html" class="link">SEARCH</a>
          </nav>
        </div>
        <div class="top-nav-actions">
          <a href="signup.html" class="icon-btn nav-side-link">SIGN UP</a>
          <a href="cart.html" class="icon-btn cart-btn" id="cartNavLink" aria-label="View cart">
            <img
              class="cart-png"
              src="https://cdn-icons-png.flaticon.com/512/263/263142.png"
              alt=""
            />
            <span id="cartCount" class="dot">0</span>
          </a>
        </div>
      </div>
    </header>

    <main class="auth-main">
      <section class="auth-card">
        <h1 class="auth-title">LOG IN</h1>
        <p class="auth-lead micro">University email only — keeps swaps on campus.</p>
        <p class="auth-hint micro" id="domainHint"></p>
        <form id="loginForm" class="auth-form" novalidate>
          <div class="form-field">
            <label class="micro" for="email">UNIVERSITY EMAIL</label>
            <input type="email" id="email" name="email" autocomplete="username" required class="auth-input" />
          </div>
          <div class="form-field">
            <label class="micro" for="password">PASSWORD</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required class="auth-input" minlength="8" />
          </div>
          <p id="authError" class="auth-error" hidden role="alert"></p>
          <button type="submit" class="btn full auth-submit">LOG IN</button>
        </form>
        <p class="auth-switch micro">
          No account? <a href="signup.html" class="link">SIGN UP</a>
        </p>
      </section>
    </main>

    <script src="assets/js/store-shared.js"></script>
    <script src="assets/js/store-auth.js"></script>
    <script>
      window.StoreAuth.updateNav();
    </script>
    <script src="assets/js/store-login.js"></script>
  </body>
</html>
