<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudySwap</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png" />
    <link rel="shortcut icon" href="favicon.ico" />
  </head>
  <body class="auth-body">
    <header class="top-nav">
      <div class="top-nav-inner">
        <div class="brand-left">
          <a href="index.html" class="brand" aria-label="StudySwap home">
            <img src="assets/studyswap.png" class="brand-logo" alt="StudySwap" />
          </a>
          <a href="landing.html" class="icon-btn">HOME</a>
        </div>
        <div class="desktop-nav">
          <nav class="links" aria-label="Shop sections">
            <a href="index.html" class="link">ALL</a>
            <a href="search.html" class="link">SEARCH</a>
          </nav>
        </div>
        <div class="top-nav-actions">
          <div class="profile-menu" id="profileMenu">
            <a href="login.html" class="icon-btn profile-link" id="profileLink" aria-label="Log in">
              <img
                class="profile-png"
                src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png"
                alt=""
              />
            </a>
            <div class="profile-dropdown" id="profileDropdown">
              <div class="profile-dd-email" id="profileEmail"></div>
              <a class="profile-dd-link profile-dd-item" href="profile.html">PROFILE</a>
              <a class="profile-dd-link profile-dd-item" href="my-listings.html">MY LISTINGS</a>
              <a class="profile-dd-link profile-dd-item" href="my-offers.html">MY OFFERS</a>
              <button type="button" class="profile-dd-item" id="logoutBtn">LOG OUT</button>
            </div>
          </div>
          <a href="cart.html" class="icon-btn cart-btn" id="cartNavLink" aria-label="View cart">
            <img
              class="cart-png"
              src="https://cdn-icons-png.flaticon.com/512/263/263142.png"
              alt=""
            />
            <span id="cartCount" class="dot">0</span>
          </a>
        </div>
      </div>
    </header>

    <main class="auth-main">
      <section class="auth-card">
        <h1 class="auth-title">SIGN UP</h1>
        <p class="auth-lead micro">Create an account with your official university email.</p>
        <p class="auth-hint micro" id="domainHint"></p>
        <form id="signupForm" class="auth-form" novalidate>
          <div class="form-field">
            <label class="micro" for="email">UNIVERSITY EMAIL</label>
            <input type="email" id="email" name="email" autocomplete="username" required class="auth-input" />
          </div>
          <div class="form-field">
            <label class="micro" for="password">PASSWORD (MIN 8 CHARACTERS)</label>
            <input type="password" id="password" name="password" autocomplete="new-password" required class="auth-input" minlength="8" />
          </div>
          <div class="form-field">
            <label class="micro" for="password2">CONFIRM PASSWORD</label>
            <input type="password" id="password2" name="password2" autocomplete="new-password" required class="auth-input" minlength="8" />
          </div>
          <p id="authError" class="auth-error" hidden role="alert"></p>
          <button type="submit" class="btn full auth-submit">CREATE ACCOUNT</button>
        </form>
        <p class="auth-switch micro">
          Already have an account? <a href="login.html" class="link">LOG IN</a>
        </p>
      </section>
    </main>

    <script src="assets/js/store-shared.js"></script>
    <script src="assets/js/store-auth.js"></script>
    <script>
      window.StoreAuth.updateNav();
    </script>
    <script src="assets/js/store-signup.js"></script>
  </body>
</html>
