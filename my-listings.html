<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudySwap</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png" />
    <link rel="shortcut icon" href="favicon.ico" />
  </head>
  <body>
    <header class="top-nav">
      <div class="top-nav-inner">
        <div class="brand-left">
          <a href="index.html" class="brand" aria-label="StudySwap home">
            <img src="assets/studyswap.png" class="brand-logo" alt="StudySwap" />
          </a>
          <a href="landing.html" class="icon-btn">HOME</a>
        </div>
        <div class="desktop-nav">
          <nav class="links" aria-label="Shop sections">
            <a href="index.html" class="link">ALL</a>
            <a href="search.html" class="link">SEARCH</a>
          </nav>
        </div>
        <div class="top-nav-actions">
          <div class="profile-menu" id="profileMenu">
            <a href="login.html" class="icon-btn profile-link" id="profileLink" aria-label="Log in">
              <img class="profile-png" src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png" alt="" />
            </a>
            <div class="profile-dropdown" id="profileDropdown">
              <div class="profile-dd-email" id="profileEmail"></div>
              <a class="profile-dd-link profile-dd-item" href="profile.html">PROFILE</a>
              <a class="profile-dd-link profile-dd-item" href="my-listings.html">MY LISTINGS</a>
              <a class="profile-dd-link profile-dd-item" href="my-offers.html">MY OFFERS</a>
              <button type="button" class="profile-dd-item" id="logoutBtn">LOG OUT</button>
            </div>
          </div>
          <a href="chats.html" class="icon-btn nav-side-link"><img class="chats-png" src="https://cdn-icons-png.flaticon.com/512/1380/1380338.png" alt="Chats" /></a>
          <a href="cart.html" class="icon-btn cart-btn" id="cartNavLink" aria-label="View cart">
            <img class="cart-png" src="https://cdn-icons-png.flaticon.com/512/263/263142.png" alt="" />
            <span id="cartCount" class="dot">0</span>
          </a>
        </div>
      </div>
    </header>

    <main class="profile-main">
      <h1 class="page-title">MY LISTINGS</h1>
      <div id="myListingsDashboard" class="profile-listings-board"></div>
    </main>
    <button type="button" class="listing-fab" id="openAddListingBtn" aria-label="Add new listing">+</button>
    <section class="listing-sheet" id="listingSheet" hidden>
      <div class="listing-sheet-card">
        <div class="listing-sheet-head">
          <p class="micro">ADD A BOOK</p>
          <button type="button" class="listing-sheet-close" id="closeAddListingBtn" aria-label="Close">x</button>
        </div>
        <form id="addListingForm" class="profile-form" novalidate>
          <div class="form-field">
            <label class="micro" for="listingTitle">BOOK TITLE</label>
            <input id="listingTitle" class="auth-input" required />
          </div>
          <div class="form-field">
            <label class="micro" for="listingCourse">COURSE CODE</label>
            <input id="listingCourse" class="auth-input" placeholder="e.g. COMP2011" required />
          </div>
          <label class="profile-check">
            <input type="checkbox" id="listingExchangeOnly" />
            <span>EXCHANGE ONLY</span>
          </label>
          <div class="form-field" id="priceField">
            <label class="micro" for="listingPrice">PRICE (HKD)</label>
            <input id="listingPrice" class="auth-input" type="number" min="1" step="1" inputmode="numeric" placeholder="e.g. 120" />
          </div>
          <div class="form-field">
            <label class="micro" for="listingWanted">WANTED IN EXCHANGE (OPTIONAL)</label>
            <textarea id="listingWanted" class="auth-input profile-textarea" rows="3" placeholder="What books would you accept?"></textarea>
          </div>
          <div class="form-field">
            <label class="micro" for="listingDesc">DESCRIPTION</label>
            <textarea id="listingDesc" class="auth-input profile-textarea" rows="3" placeholder="Condition, notes, pickup preferences..."></textarea>
          </div>
          <div class="form-field">
            <label class="micro" for="listingUni">UNIVERSITY</label>
            <select id="listingUni" class="auth-input"></select>
          </div>
          <p id="listingSuccess" class="listing-success micro" hidden>BOOK LISTED</p>
          <p id="listingError" class="auth-error" hidden role="alert"></p>
          <button type="submit" class="btn full">ADD LISTING</button>
        </form>
      </div>
    </section>

    <script src="assets/js/store-shared.js"></script>
    <script src="assets/js/store-auth.js"></script>
    <script>window.StoreAuth.updateNav();</script>
    <script src="assets/js/store-my-listings.js"></script>
  </body>
</html>
