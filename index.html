<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudySwap</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png" />
    <link rel="shortcut icon" href="favicon.ico" />
  </head>
  <body>
    <header class="top-nav">
      <div class="top-nav-inner">
        <div class="brand-left">
          <a href="index.html" class="brand" aria-label="StudySwap home">
            <img src="assets/studyswap.png" class="brand-logo" alt="StudySwap" />
          </a>
          <button id="mobileMenuBtn" class="icon-btn" type="button">+</button>
        </div>
        <div class="desktop-nav">
          <button id="desktopMenuBtn" class="icon-btn" type="button">+</button>
          <nav id="categoryNav" class="links"></nav>
        </div>
        <div class="top-nav-actions">
          <div class="profile-menu" id="profileMenu">
            <a href="login.html" class="icon-btn profile-link" id="profileLink" aria-label="Log in">
              <img
                class="profile-png"
                src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png"
                alt=""
              />
            </a>
            <div class="profile-dropdown" id="profileDropdown">
              <div class="profile-dd-email" id="profileEmail"></div>
              <a class="profile-dd-link profile-dd-item" href="profile.html">PROFILE</a>
              <a class="profile-dd-link profile-dd-item" href="my-listings.html">MY LISTINGS</a>
              <a class="profile-dd-link profile-dd-item" href="my-offers.html">MY OFFERS</a>
              <button type="button" class="profile-dd-item" id="logoutBtn">LOG OUT</button>
            </div>
          </div>
          <a href="chats.html" class="icon-btn nav-side-link" id="chatsNavLink"><img class="chats-png" src="https://cdn-icons-png.flaticon.com/512/1380/1380338.png" alt="Chats" /></a>
          <a href="cart.html" class="icon-btn cart-btn" id="cartNavLink" aria-label="View cart">
            <img
              class="cart-png"
              src="https://cdn-icons-png.flaticon.com/512/263/263142.png"
              alt=""
            />
            <span id="cartCount" class="dot">0</span>
          </a>
        </div>
      </div>
    </header>

    <main class="main-pad">
      <section id="productGrid" class="grid-list"></section>
    </main>

    <div id="filterModal" class="modal-overlay" hidden>
      <div class="modal-panel" role="dialog" aria-labelledby="filterModalTitle">
        <div class="modal-head">
          <h2 id="filterModalTitle" class="modal-title">FILTERS</h2>
          <button type="button" id="closeFilterModal" class="icon-btn">CLOSE</button>
        </div>
        <div class="modal-body">
          <p class="micro">PRICE RANGE (HKD)</p>
          <div class="range-readout" id="filterPriceReadout"></div>
          <div class="dual-range-ui" id="filterDualRange">
            <div class="dual-range-track-bg" aria-hidden="true"></div>
            <div class="dual-range-fill" id="filterRangeFill" aria-hidden="true"></div>
            <label class="sr-only" for="filterMinRange">Minimum price</label>
            <input type="range" id="filterMinRange" class="dual-range-input dual-range-min" min="0" max="100" value="0" />
            <label class="sr-only" for="filterMaxRange">Maximum price</label>
            <input type="range" id="filterMaxRange" class="dual-range-input dual-range-max" min="0" max="100" value="100" />
          </div>
          <p class="micro modal-section-label">UNIVERSITY</p>
          <p class="modal-hint">Select one or more. Leave none selected to show all.</p>
          <div id="filterUniList" class="chip-grid"></div>
        </div>
        <div class="modal-foot">
          <button type="button" id="clearFilterBtn" class="ghost-btn">CLEAR</button>
          <button type="button" id="applyFilterBtn" class="btn modal-apply">APPLY</button>
        </div>
      </div>
    </div>

    <script src="assets/js/store-shared.js"></script>
    <script src="assets/js/store-auth.js"></script>
    <script>
      window.StoreAuth.updateNav();
    </script>
    <script src="assets/js/store-home.js"></script>
  </body>
</html>
